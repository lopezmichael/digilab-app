<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(0,200,255,0.15)" stroke-width="0.5"/>
    </pattern>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="strongGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A3055"/>
      <stop offset="100%" style="stop-color:#0F4C81"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" fill="url(#bgGradient)" rx="24"/>
  <rect width="200" height="200" fill="url(#grid)" rx="24"/>

  <!-- Corner circuit accents -->
  <g filter="url(#glow)">
    <path d="M 0 45 L 0 24 Q 0 0 24 0 L 45 0" fill="none" stroke="#00C8FF" stroke-width="2.5"/>
    <circle cx="0" cy="45" r="4" fill="#00C8FF"/>
    <circle cx="45" cy="0" r="4" fill="#00C8FF"/>

    <path d="M 200 45 L 200 24 Q 200 0 176 0 L 155 0" fill="none" stroke="#00C8FF" stroke-width="2.5"/>
    <circle cx="200" cy="45" r="4" fill="#00C8FF"/>
    <circle cx="155" cy="0" r="4" fill="#00C8FF"/>

    <path d="M 0 155 L 0 176 Q 0 200 24 200 L 45 200" fill="none" stroke="#00C8FF" stroke-width="2.5"/>
    <circle cx="0" cy="155" r="4" fill="#00C8FF"/>
    <circle cx="45" cy="200" r="4" fill="#00C8FF"/>

    <path d="M 200 155 L 200 176 Q 200 200 176 200 L 155 200" fill="none" stroke="#00C8FF" stroke-width="2.5"/>
    <circle cx="200" cy="155" r="4" fill="#00C8FF"/>
    <circle cx="155" cy="200" r="4" fill="#00C8FF"/>
  </g>

